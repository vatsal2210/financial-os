name: Auto Version, Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(python3 -c "exec(open('version.py').read()); print(VERSION)")
          FIRST_LINE=$(git log -1 --format=%s)
          echo "Current: ${CURRENT} | Commit: ${FIRST_LINE}"

          if echo "$FIRST_LINE" | grep -qF "[release:major]"; then
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            NEW="$((MAJOR + 1)).0.0"
          elif echo "$FIRST_LINE" | grep -qF "[release:minor]"; then
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            MINOR=$(echo $CURRENT | cut -d. -f2)
            NEW="${MAJOR}.$((MINOR + 1)).0"
          else
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            MINOR=$(echo $CURRENT | cut -d. -f2)
            PATCH=$(echo $CURRENT | cut -d. -f3)
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          TAG="v${NEW}"
          TODAY=$(date +%Y.%m.%d)
          echo "Bumping to ${NEW}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} exists — skipping"
            echo "new_version=" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Update version.py
          printf '"""Finance OS version info."""\nVERSION = "%s"\nBUILD = "%s"\n' "$NEW" "$TODAY" > version.py

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.py
          git commit -m "Bump version to ${NEW} [skip ci]"
          git push origin main
          git tag "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          echo "new_version=${NEW}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  build-mac:
    needs: version
    if: needs.version.outputs.tag != ''
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and build
        run: |
          pip install -r requirements.txt pyinstaller pywebview
          python -m PyInstaller financeos.spec --noconfirm
          hdiutil create -volname "Finance OS" -srcfolder "dist/Finance OS.app" -ov -format UDZO "dist/Finance-OS-mac.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Finance-OS-mac.dmg

  build-windows:
    needs: version
    if: needs.version.outputs.tag != ''
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and build
        run: |
          pip install -r requirements.txt pyinstaller pywebview Pillow
          python -m PyInstaller financeos-win.spec --noconfirm
          Compress-Archive -Path "dist\FinanceOS\*" -DestinationPath "dist\Finance-OS-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/Finance-OS-windows.zip

  release:
    needs: [version, build-mac, build-windows]
    if: needs.version.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Finance OS ${{ needs.version.outputs.tag }}
          files: |
            artifacts/Finance-OS-mac.dmg
            artifacts/Finance-OS-windows.zip
          body: |
            ## Finance OS ${{ needs.version.outputs.tag }}

            | Platform | Download |
            |----------|----------|
            | **macOS** | `Finance-OS-mac.dmg` — Open, drag to Applications |
            | **Windows** | `Finance-OS-windows.zip` — Unzip, run `FinanceOS.exe` |
